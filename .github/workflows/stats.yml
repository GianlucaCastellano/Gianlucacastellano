name: Generate Stats Images
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Language Stats
        uses: anuraghazra/github-readme-stats@master
        with:
          username: Gianlucacastellano
          output: lang-stats.svg
          include_all_commits: true
          layout: compact
          theme: react
